<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yield</title>
  <link rel="stylesheet" href="dist/popup.css" />
</head>
<body>

<div class="header">
  <div class="wordmark">◈ YIELD<span>.</span></div>
  <div class="engine-dot" id="engineDot" title="Checking engine..."></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="scan">Scan</div>
  <div class="tab" data-tab="news">News</div>
</div>

<!-- SCAN TAB -->
<div class="tab-content active" id="tab-scan">
  <div class="scan-panel">
    <button class="scan-btn" id="scanBtn">Scan this page</button>
    <div class="status" id="status"></div>
    <div id="results" style="display:none">
      <div class="summary" id="summaryText"></div>
      <div id="chipsWrap" style="display:none">
        <div class="chips-label">Holdings impact</div>
        <div class="chips" id="chips"></div>
      </div>
    </div>
  </div>
</div>


<!-- NEWS TAB -->
<div class="tab-content" id="tab-news">
  <div class="news-panel">
    <div class="news-toolbar">
      <span class="news-toolbar-label">Recent · your holdings</span>
      <button class="news-refresh-btn" id="newsRefreshBtn">↻</button>
    </div>
    <div id="newsList"></div>
  </div>
</div>

<div class="footer">
  <span>yield v1.0</span>
  <span id="footerTime"></span>
</div>

<script src="dist/popup.js"></script>
</body>
</html>
