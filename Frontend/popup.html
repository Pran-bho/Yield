<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="src/popup/popup.css" />
  <title>Yield</title>
</head>
<body>
  <div id="app">

    <header>
      <h1>Yield</h1>
      <span id="health-indicator" class="health-offline">Checking...</span>
    </header>

    <section id="holdings-section">
      <div class="section-header">
        <h2>Portfolio</h2>
        <div class="section-header-right">
          <div id="portfolio-summary"></div>
          <button id="view-toggle" title="Toggle chart view">
            <svg id="icon-graph" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <svg id="icon-compact" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
      <ul id="holdings-list"></ul>
    </section>

    <section id="scan-section">
      <button id="scan-btn" disabled>Scan This Page</button>
      <p id="scan-status" class="status-muted"></p>
    </section>

    <section id="result-section" hidden>
      <h2>Analysis</h2>
      <div id="result-content"></div>
    </section>

  </div>
  <script src="dist/popup.js"></script>
</body>
</html>
